services:
  - type: web
    name: ptt-smokehouse-control
    env: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && test -s pnpm-lock.yaml && pnpm install --prod=false --frozen-lockfile && pnpm run render-build
    startCommand: pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: DATABASE_URL
        fromDatabase:
          name: ptt-smokehouse-control-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SESSION_TOKEN
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: PTT Smokehouse Control
      - key: BILLING_MODE
        value: MANUAL_INVOICE
      - key: ENFORCE_PRIVILEGED_2FA
        value: "true"
      - key: TENANT_GUARD_ENABLED
        value: "1"
      - key: BILLING_CONTACT_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: BACKUP_POST_URL
        sync: false
      - key: BACKUP_APP_URL
        sync: false

  - type: cron
    name: ptt-smokehouse-control-weekly-backup
    env: node
    schedule: "0 8 * * 0"
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && test -s pnpm-lock.yaml && pnpm install --prod=false --frozen-lockfile
    startCommand: pnpm run backup:weekly
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: CRON_SECRET
        sync: false
      - key: BACKUP_APP_URL
        sync: false
      - key: BACKUP_POST_URL
        sync: false

databases:
  - name: ptt-smokehouse-control-db
    plan: starter
