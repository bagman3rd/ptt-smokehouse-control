services:
  - type: web
    name: ptt-smokehouse-control
    env: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --prod=false && pnpm run render-build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: DATABASE_URL
        fromDatabase:
          name: ptt-smokehouse-control-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SESSION_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: PTT Smokehouse Control

databases:
  - name: ptt-smokehouse-control-db
    plan: starter
