services:
  - type: web
    name: ptt-smokehouse-control
    env: node
    plan: free
    buildCommand: npm ci --legacy-peer-deps && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
