services:
  - type: web
    name: ptt-smokehouse-control
    env: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && if [ -f pnpm-lock.yaml ]; then pnpm install --prod=false --frozen-lockfile; else pnpm install --prod=false --no-frozen-lockfile; fi && pnpm run render-build
    startCommand: pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: DATABASE_URL
        fromDatabase:
          name: ptt-smokehouse-control-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SESSION_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: PTT Smokehouse Control
      - key: CRON_SECRET
        sync: false
      - key: BACKUP_POST_URL
        sync: false
      - key: BACKUP_APP_URL
        sync: false

  - type: cron
    name: ptt-smokehouse-control-weekly-backup
    env: node
    schedule: "0 8 * * 0"
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && if [ -f pnpm-lock.yaml ]; then pnpm install --prod=false --frozen-lockfile; else pnpm install --prod=false --no-frozen-lockfile; fi
    startCommand: pnpm run backup:weekly
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: CRON_SECRET
        sync: false
      - key: BACKUP_APP_URL
        sync: false
      - key: BACKUP_POST_URL
        sync: false

databases:
  - name: ptt-smokehouse-control-db
    plan: starter
