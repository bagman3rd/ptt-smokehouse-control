services:
  - type: web
    name: ptt-smokehouse-control
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ptt-smokehouse-control-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SESSION_TOKEN
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: PTT Smokehouse Control

databases:
  - name: ptt-smokehouse-control-db
    plan: starter
