name: Package Build 9.8.0
on:
  workflow_run:
    workflows: ['Build 9.8.0 CI']
    types: [completed]
permissions:
  contents: read
jobs:
  package-exact-green-commit:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact green commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify exact commit
        run: test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"
      - name: Write release evidence
        run: |
          cat > RELEASE_EVIDENCE.json <<JSON
          {
            "build": "9.8.0",
            "commitSha": "${{ github.event.workflow_run.head_sha }}",
            "ciRunId": "${{ github.event.workflow_run.id }}",
            "ciConclusion": "${{ github.event.workflow_run.conclusion }}",
            "packagedByRunId": "${{ github.run_id }}"
          }
          JSON
      - name: Package audited source ZIP
        run: |
          zip -qr ptt-smokehouse-control-build-9.8.0-audited-flat.zip . \
            -x '.git/*' 'node_modules/*' '.next/*' 'playwright-report/*' 'test-results/*'
      - uses: actions/upload-artifact@v4
        with:
          name: ptt-smokehouse-control-build-9.8.0-${{ github.event.workflow_run.head_sha }}
          path: ptt-smokehouse-control-build-9.8.0-audited-flat.zip
          retention-days: 90
