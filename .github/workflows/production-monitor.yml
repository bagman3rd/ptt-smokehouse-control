name: Build 7.8.4 production monitor

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Verify deployed build and authenticated transaction
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://ptt-smokehouse-control.onrender.com' }}
          EXPECTED_BUILD: '7.8.4'
          PRODUCTION_SMOKE_USERNAME: ${{ secrets.PRODUCTION_SMOKE_USERNAME }}
          PRODUCTION_SMOKE_PASSWORD: ${{ secrets.PRODUCTION_SMOKE_PASSWORD }}
        run: node scripts/production-smoke-check.mjs
