name: Production health monitor

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
      - name: Check application and database health
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://ptt-smokehouse-control.onrender.com' }}
        run: node scripts/production-smoke-check.mjs
