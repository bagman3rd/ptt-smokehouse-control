name: Build 6.3.4 Lockfile Bootstrap

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ptt-lockfile-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-lockfile:
    name: Check and generate pnpm lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether lockfile already exists
        id: lockfile
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "pnpm-lock.yaml already exists; no bootstrap work is required."
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "pnpm-lock.yaml is missing and will be generated."
          fi

      - name: Set up pnpm
        if: steps.lockfile.outputs.missing == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        if: steps.lockfile.outputs.missing == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Generate lockfile from package manifest
        if: steps.lockfile.outputs.missing == 'true'
        run: pnpm install --lockfile-only

      - name: Commit generated lockfile
        if: steps.lockfile.outputs.missing == 'true'
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml && git diff --cached --quiet -- pnpm-lock.yaml; then
            echo "No lockfile change was produced; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Build 6.3.4: commit deterministic pnpm lockfile"
          git push
