name: Build 6.3.1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ['Generate pnpm lockfile']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ptt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Build 6.3.1 CI / quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ptt_ci
          POSTGRES_PASSWORD: ptt_ci_password
          POSTGRES_DB: ptt_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ptt_ci -d ptt_ci"
          --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      DIRECT_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      ADMIN_PASSWORD: ci-admin-password
      CI_TENANT_B_PASSWORD: ci-tenant-b-password
      APP_SESSION_TOKEN: ci-session-token-long-value-for-tests-only
      CRON_SECRET: ci-cron-secret-long-value-for-tests-only
      NEXT_PUBLIC_APP_NAME: Smokehouse Control CI
      NEXT_PUBLIC_SUPPORT_EMAIL: support@smokehousecontrol.com
      CI: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}
      - name: Detect committed lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then echo 'present=true' >> "$GITHUB_OUTPUT"; else echo 'present=false' >> "$GITHUB_OUTPUT"; fi
      - uses: pnpm/action-setup@v4
        if: steps.lockfile.outputs.present == 'true'
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.present == 'true'
        with:
          node-version: 20.18.1
          cache: pnpm
      - name: Install exact locked dependencies
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm run prisma:generate
      - name: Apply migrations to fresh PostgreSQL
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm run prisma:migrate
      - name: Seed isolated CI database
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm run db:seed
      - name: Migration and schema smoke checks
        if: steps.lockfile.outputs.present == 'true'
        run: |
          pnpm run preflight
          pnpm run test:migration-integrity
          pnpm run migration:smoke
          pnpm run ci:migration-status
          pnpm run ci:schema-drift
      - name: TypeScript and lint
        if: steps.lockfile.outputs.present == 'true'
        run: |
          pnpm run typecheck
          pnpm run lint
      - name: Regression tests
        if: steps.lockfile.outputs.present == 'true'
        run: |
          pnpm run test:forecast
          pnpm run test:generate-plan
          pnpm run test:smoker-catalog
          pnpm run test:permissions
          pnpm run test:account-security
          pnpm run test:tenant
          pnpm run test:cross-tenant
          pnpm run test:tenant-guard
          pnpm run test:orphan-records
          pnpm run test:dead-code
          pnpm run staging:verify
          pnpm run test:pos-import
          pnpm run test:demo-docs
          pnpm run build:eval
      - name: Build production application
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm run build
      - name: Install Chromium
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run desktop and mobile browser tests
        if: steps.lockfile.outputs.present == 'true'
        run: pnpm run test:e2e:ci
      - name: Upload Playwright report on failure
        if: failure() && steps.lockfile.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
