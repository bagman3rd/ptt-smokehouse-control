name: Build 5.9.1 CI

on:
  push:
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ptt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ptt_ci?schema=public
      APP_SESSION_TOKEN: ci-session-token-12345
      ADMIN_PASSWORD: ci-admin-password-12345
      CRON_SECRET: ci-cron-secret-12345
      NEXT_PUBLIC_APP_NAME: Smokehouse Control
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prisma generate
        run: pnpm run prisma:generate

      - name: Preflight build checks
        run: pnpm run preflight

      - name: Type-check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Forecast engine tests
        run: pnpm run test:forecast

      - name: Permission-boundary tests
        run: pnpm run test:permissions

      - name: Account-security tests
        run: pnpm run test:account-security

      - name: Dead-code check
        run: pnpm run test:dead-code

      - name: Apply migrations to fresh Postgres schema
        run: pnpm run prisma:migrate

      - name: Verify migration status
        run: pnpm run ci:migration-status

      - name: Migration integrity tests
        run: pnpm run test:migration-integrity

      - name: Tenant isolation integration test
        run: pnpm run test:tenant

      - name: Cross-tenant regression test
        run: pnpm run test:cross-tenant

      - name: Tenant guard coverage test
        run: pnpm run test:tenant-guard

      - name: Orphan record check
        run: pnpm run test:orphan-records

      - name: POS import mapping tests
        run: pnpm run test:pos-import

      - name: Prisma schema drift check
        run: pnpm run ci:schema-drift
