name: Build 9.4.0 CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ptt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ptt_test
      APP_SESSION_TOKEN: ci-session-token-at-least-32-characters
      ADMIN_PASSWORD: ci-admin-password
      TOTP_ENCRYPTION_KEY: ci-totp-key-at-least-32-characters-long
      TENANT_GUARD_ENABLED: "1"
      ENFORCE_PRIVILEGED_2FA: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm run ci:node-engine-check
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - run: pnpm run prisma:migrate
      - run: pnpm run ci:migration-status
      - run: pnpm run ci:schema-drift
      - run: pnpm run preflight
      - run: pnpm run ci:test
      - run: pnpm run build
      - run: pnpm run test:e2e:install
      - run: pnpm run test:e2e:accessibility
      - run: pnpm run test:e2e:interactions
      - run: pnpm run test:e2e:concurrency
      - run: pnpm run test:e2e:eod-lifecycle
      - run: pnpm run test:load-realistic
      - run: pnpm run test:report-rollup
      - run: pnpm run security:audit
