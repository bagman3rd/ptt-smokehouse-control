name: Build 6.2.0 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Build 6.2.0 CI / quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ptt_ci
          POSTGRES_PASSWORD: ptt_ci_password
          POSTGRES_DB: ptt_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U ptt_ci -d ptt_ci"
          --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      DIRECT_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      ADMIN_PASSWORD: ci-admin-password-6-1-1
      APP_SESSION_TOKEN: ci-session-token-6-1-1-long-value
      CRON_SECRET: ci-cron-secret-6-1-1-long-value
      NEXT_PUBLIC_APP_NAME: Smokehouse Control CI
      NEXT_PUBLIC_SUPPORT_EMAIL: support@smokehousecontrol.com
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate Prisma client
        run: pnpm run prisma:generate
      - name: Apply migrations to fresh PostgreSQL
        run: pnpm run prisma:migrate
      - name: Seed isolated CI database
        run: pnpm run db:seed
      - name: Run static, migration, and regression checks
        run: >-
          pnpm run preflight && pnpm run test:migration-integrity && pnpm run ci:migration-status && pnpm run ci:schema-drift &&
          pnpm run typecheck && pnpm run lint && pnpm run test:forecast && pnpm run test:generate-plan &&
          pnpm run test:permissions && pnpm run test:account-security && pnpm run test:dead-code && pnpm run test:tenant &&
          pnpm run test:cross-tenant && pnpm run test:tenant-guard && pnpm run test:orphan-records && pnpm run staging:verify &&
          pnpm run test:pos-import && pnpm run test:demo-docs && pnpm run test:smoker-catalog && pnpm run build:eval
      - name: Build production application
        run: pnpm run build
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser end-to-end tests
        run: pnpm run test:e2e:ci
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
