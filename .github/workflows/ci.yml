name: Build 6.0.1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Build 6.0.1 CI / quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ptt_ci
          POSTGRES_PASSWORD: ptt_ci_password
          POSTGRES_DB: ptt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ptt_ci -d ptt_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      DIRECT_URL: postgresql://ptt_ci:ptt_ci_password@localhost:5432/ptt_ci?schema=public
      ADMIN_PASSWORD: ci-admin-password-6-0-1
      APP_SESSION_TOKEN: ci-session-token-6-0-1-long-value
      CRON_SECRET: ci-cron-secret-6-0-1-long-value
      NEXT_PUBLIC_APP_NAME: Smokehouse Control CI
      NEXT_PUBLIC_SUPPORT_EMAIL: support@smokehousecontrol.com
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations to fresh PostgreSQL
        run: npm run prisma:migrate # prisma migrate deploy

      - name: Run preflight checks
        run: npm run preflight

      - name: Run migration integrity checks
        run: npm run test:migration-integrity

      - name: Check migration status
        run: npm run ci:migration-status

      - name: Check schema drift
        run: npm run ci:schema-drift

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run application regression suite
        run: >-
          npm run test:forecast &&
          npm run test:generate-plan &&
          npm run test:permissions &&
          npm run test:account-security &&
          npm run test:dead-code &&
          npm run test:tenant &&
          npm run test:cross-tenant &&
          npm run test:tenant-guard &&
          npm run test:orphan-records &&
          npm run staging:verify &&
          npm run test:pos-import &&
          npm run test:demo-docs &&
          npm run test:smoker-catalog &&
          npm run build:eval

      - name: Build production application
        run: npm run build
