services:
  - type: web
    name: ptt-smokehouse-control-staging
    env: node
    plan: starter
    branch: staging
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile && pnpm run render-build
    startCommand: pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: ptt-smokehouse-control-staging-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_SESSION_TOKEN
        sync: false
      - key: SQUARE_APPLICATION_ID
        sync: false
      - key: SQUARE_APPLICATION_SECRET
        sync: false
      - key: SQUARE_REDIRECT_URI
        sync: false
      - key: SQUARE_WEBHOOK_SIGNATURE_KEY
        sync: false
      - key: SQUARE_WEBHOOK_NOTIFICATION_URL
        sync: false
      - key: POS_SQUARE_ENV
        value: sandbox
      - key: POS_CRON_SECRET
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: TENANT_GUARD_ENABLED
        value: "1"
      - key: ENFORCE_PRIVILEGED_2FA
        value: "false"
databases:
  - name: ptt-smokehouse-control-staging-db
    plan: starter
